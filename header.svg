<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a11cb"/>
      <stop offset="100%" style="stop-color:#2575fc"/>
    </linearGradient>
    <style>
      .name {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 64px;
        font-weight: 800;
        letter-spacing: -1px;
        fill: url(#textGrad);
        filter: url(#glow);
        animation: pulse 3s ease-in-out infinite;
      }
      .sub {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 20px;
        font-weight: 400;
        fill: #8b949e;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .dot {
        animation: blink 1.4s step-start infinite;
        fill: #2575fc;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.85; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
 
  <!-- background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
 
  <!-- decorative lines -->
  <line x1="0" y1="190" x2="900" y2="190" stroke="#6a11cb" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="10" x2="900" y2="10" stroke="#2575fc" stroke-width="0.5" opacity="0.4"/>
 
  <!-- name -->
  <text x="450" y="118" text-anchor="middle" class="name">Farhaan Shaikh<tspan class="dot">_</tspan></text>
 
  <!-- subtitle -->
  <text x="450" y="155" text-anchor="middle" class="sub">Full stack · Web Dev · App dev · AI</text>
</svg>
