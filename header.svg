<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <defs>
    <!-- Animated gradient for name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc">
        <animate attributeName="stop-color" values="#c084fc;#818cf8;#38bdf8;#818cf8;#c084fc" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#38bdf8;#c084fc;#38bdf8;#818cf8" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#c084fc;#818cf8;#c084fc;#38bdf8" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a11cb"/>
      <stop offset="100%" style="stop-color:#2575fc"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Outer glow for orbs -->
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Scanlines -->
    <pattern id="scanlines" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="#ffffff" opacity="0.018"/>
    </pattern>

    <!-- Dot grid -->
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#6a11cb" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="900" height="240" fill="#0d1117" rx="14"/>

  <!-- Dot grid -->
  <rect width="900" height="240" fill="url(#grid)" rx="14"/>

  <!-- Scanlines -->
  <rect width="900" height="240" fill="url(#scanlines)" rx="14"/>

  <!-- Animated floating orbs -->
  <circle cx="110" cy="55" r="85" fill="#6a11cb" opacity="0.07" filter="url(#orbGlow)">
    <animate attributeName="cy" values="55;80;55" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="85;100;85" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="790" cy="185" r="95" fill="#2575fc" opacity="0.07" filter="url(#orbGlow)">
    <animate attributeName="cy" values="185;160;185" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="r" values="95;115;95" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="120" r="130" fill="#818cf8" opacity="0.035" filter="url(#orbGlow)">
    <animate attributeName="r" values="130;150;130" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Top border line animated -->
  <rect x="0" y="0" width="900" height="2" fill="url(#borderGrad)" rx="1"/>
  <!-- Bottom border -->
  <rect x="0" y="238" width="900" height="2" fill="url(#borderGrad)" rx="1"/>

  <!-- Corner brackets — top left -->
  <polyline points="14,40 14,14 40,14" fill="none" stroke="#6a11cb" stroke-width="2" opacity="0.9"/>
  <!-- Corner brackets — top right -->
  <polyline points="860,14 886,14 886,40" fill="none" stroke="#2575fc" stroke-width="2" opacity="0.9"/>
  <!-- Corner brackets — bottom left -->
  <polyline points="14,200 14,226 40,226" fill="none" stroke="#6a11cb" stroke-width="2" opacity="0.9"/>
  <!-- Corner brackets — bottom right -->
  <polyline points="860,226 886,226 886,200" fill="none" stroke="#2575fc" stroke-width="2" opacity="0.9"/>

  <!-- Floating particles -->
  <circle cx="75" cy="38" r="1.8" fill="#c084fc" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="38;32;38" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="825" cy="202" r="1.8" fill="#38bdf8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="202;196;202" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="215" r="1.2" fill="#818cf8" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="28" r="1.2" fill="#c084fc" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="18" r="1.4" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="222" r="1.4" fill="#6a11cb" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="20" r="1" fill="#818cf8" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="220" r="1" fill="#2575fc" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- FS monogram watermark -->
  <text x="34" y="44" font-family="'Courier New', monospace" font-size="12" fill="#6a11cb" opacity="0.55" letter-spacing="3">{ FS }</text>

  <!-- Role tag top right -->
  <text x="866" y="44" font-family="'Courier New', monospace" font-size="11" fill="#2575fc" opacity="0.55" text-anchor="end" letter-spacing="2">WEB · APP · AI</text>

  <!-- Glow blob behind name -->
  <ellipse cx="450" cy="118" rx="300" ry="60" fill="#6a11cb" opacity="0.07"/>

  <!-- MAIN NAME -->
  <text
    x="450" y="138"
    text-anchor="middle"
    font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
    font-size="74"
    font-weight="900"
    letter-spacing="-2"
    fill="url(#nameGrad)"
    filter="url(#textGlow)"
  >Farhaan Shaikh</text>

  <!-- Blinking cursor -->
  <text x="787" y="138" font-family="'Courier New', monospace" font-size="70" fill="#2575fc">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>_
  </text>

  <!-- Subtitle -->
  <text
    x="450" y="180"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="14"
    fill="#8b949e"
    letter-spacing="5"
  >BUILDING SYSTEMS · SHIPPING IMPACT · SOLVING PROBLEMS</text>

  <!-- Bottom status bar -->
  <rect x="14" y="204" width="872" height="20" fill="#0a0f16" rx="4" opacity="0.7"/>
  <circle cx="30" cy="214" r="3.5" fill="#00d26a" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="40" y="218" font-family="'Courier New', monospace" font-size="10" fill="#00d26a" opacity="0.8">AVAILABLE FOR OPPORTUNITIES</text>
  <text x="878" y="218" font-family="'Courier New', monospace" font-size="10" fill="#2575fc" opacity="0.7" text-anchor="end">Mumbai, India</text>
</svg>
