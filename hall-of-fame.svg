<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="50%" style="stop-color:#ffe98a"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a11cb"/>
      <stop offset="100%" style="stop-color:#2575fc"/>
    </linearGradient>

    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f0a2a"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f3a"/>
      <stop offset="100%" style="stop-color:#060f20"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f0a2a"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#6a11cb" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="860" height="340" fill="url(#bg)" rx="16"/>
  <rect width="860" height="340" fill="url(#dots)" rx="16"/>

  <!-- Top/bottom border -->
  <rect x="0" y="0" width="860" height="2" fill="url(#goldGrad)" rx="1" opacity="0.8"/>
  <rect x="0" y="338" width="860" height="2" fill="url(#purpleGrad)" rx="1" opacity="0.8"/>

  <!-- Corner brackets -->
  <polyline points="16,38 16,16 38,16" fill="none" stroke="#f7c948" stroke-width="2" opacity="0.7"/>
  <polyline points="822,16 844,16 844,38" fill="none" stroke="#f7c948" stroke-width="2" opacity="0.7"/>
  <polyline points="16,302 16,324 38,324" fill="none" stroke="#2575fc" stroke-width="2" opacity="0.7"/>
  <polyline points="822,324 844,324 844,302" fill="none" stroke="#2575fc" stroke-width="2" opacity="0.7"/>

  <!-- Section title -->
  <text x="430" y="46" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#f7c948" letter-spacing="8" opacity="0.9" font-weight="600">🏆  HALL  OF  FAME</text>

  <!-- Divider under title -->
  <line x1="60" y1="58" x2="800" y2="58" stroke="url(#purpleGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- ══════════════════════════════════ -->
  <!-- TOP ROW — 3 cards -->
  <!-- ══════════════════════════════════ -->

  <!-- CARD 1: SIH National Winner -->
  <rect x="22" y="70" width="258" height="110" rx="12" fill="url(#card1)"/>
  <rect x="22" y="70" width="258" height="110" rx="12" fill="none" stroke="#f7c948" stroke-width="1.2" opacity="0.5"/>
  <!-- Gold shimmer top edge -->
  <rect x="22" y="70" width="258" height="2.5" rx="1" fill="url(#goldGrad)" opacity="0.9"/>
  <!-- Medal icon area -->
  <text x="46" y="108" font-size="34" font-family="serif">🥇</text>
  <!-- Text -->
  <text x="90" y="99" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" fill="#f7c948" letter-spacing="1.5" font-weight="700">NATIONAL WINNER</text>
  <text x="90" y="116" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800" letter-spacing="0.3">Smart India</text>
  <text x="90" y="132" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800" letter-spacing="0.3">Hackathon 2024</text>
  <!-- Sub label -->
  <text x="46" y="162" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="1">Largest national tech hackathon in India</text>

  <!-- CARD 2: Recursion + Hackhive (MIDDLE — highlighted) -->
  <rect x="300" y="70" width="258" height="110" rx="12" fill="url(#card2)"/>
  <rect x="300" y="70" width="258" height="110" rx="12" fill="none" stroke="#2575fc" stroke-width="1.2" opacity="0.6"/>
  <rect x="300" y="70" width="258" height="2.5" rx="1" fill="url(#purpleGrad)" opacity="0.9"/>
  <text x="324" y="108" font-size="34" font-family="serif">🥇</text>
  <text x="368" y="99" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" fill="#818cf8" letter-spacing="1.5" font-weight="700">WINNER</text>
  <text x="368" y="116" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800">Recursion 5.0</text>
  <text x="368" y="133" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" fill="#8b949e">— &amp; —</text>
  <text x="368" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800">Hackhive 2025</text>
  <text x="324" y="162" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="1">Back-to-back hackathon champion</text>

  <!-- CARD 3: UI/UX + CSI -->
  <rect x="578" y="70" width="258" height="110" rx="12" fill="url(#card3)"/>
  <rect x="578" y="70" width="258" height="110" rx="12" fill="none" stroke="#c084fc" stroke-width="1.2" opacity="0.5"/>
  <rect x="578" y="70" width="258" height="2.5" rx="1" fill="none" stroke="none"/>
  <rect x="578" y="70" width="258" height="2.5" rx="1" fill="#c084fc" opacity="0.7"/>
  <text x="602" y="108" font-size="34" font-family="serif">🎨</text>
  <text x="646" y="99" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" fill="#c084fc" letter-spacing="1.5" font-weight="700">1ST PRIZE</text>
  <text x="646" y="116" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800">UI/UX</text>
  <text x="646" y="133" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#ffffff" font-weight="800">Championship</text>
  <text x="602" y="162" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="1">Design meets engineering</text>

  <!-- Divider -->
  <line x1="60" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.07"/>

  <!-- ══════════════════════════════════ -->
  <!-- BOTTOM ROW — stats + extras -->
  <!-- ══════════════════════════════════ -->

  <!-- Stat pill 1 -->
  <rect x="22" y="215" width="190" height="60" rx="10" fill="#111827"/>
  <rect x="22" y="215" width="190" height="60" rx="10" fill="none" stroke="#6a11cb" stroke-width="1" opacity="0.6"/>
  <text x="117" y="242" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" fill="#f7c948" font-weight="900" filter="url(#glow)">4+</text>
  <text x="117" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="2">HACKATHONS WON</text>

  <!-- Stat pill 2 -->
  <rect x="228" y="215" width="190" height="60" rx="10" fill="#111827"/>
  <rect x="228" y="215" width="190" height="60" rx="10" fill="none" stroke="#2575fc" stroke-width="1" opacity="0.6"/>
  <text x="323" y="242" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" fill="#38bdf8" font-weight="900" filter="url(#glow)">1</text>
  <text x="323" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="2">NATIONAL WIN</text>

  <!-- Stat pill 3 -->
  <rect x="434" y="215" width="190" height="60" rx="10" fill="#111827"/>
  <rect x="434" y="215" width="190" height="60" rx="10" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
  <text x="529" y="242" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" fill="#c084fc" font-weight="900" filter="url(#glow)">100k+</text>
  <text x="529" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="2">RECORDS SHIPPED</text>

  <!-- Stat pill 4 -->
  <rect x="640" y="215" width="196" height="60" rx="10" fill="#111827"/>
  <rect x="640" y="215" width="196" height="60" rx="10" fill="none" stroke="#00d26a" stroke-width="1" opacity="0.6"/>
  <text x="738" y="242" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#00d26a" font-weight="900" filter="url(#glow)">TECH LEAD</text>
  <text x="738" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#8b949e" letter-spacing="2">@ CSI</text>

  <!-- Bottom row 2: runner ups -->
  <rect x="22" y="288" width="394" height="38" rx="8" fill="#0d1117"/>
  <rect x="22" y="288" width="394" height="38" rx="8" fill="none" stroke="#2575fc" stroke-width="0.8" opacity="0.35"/>
  <text x="38" y="307" font-size="14" font-family="serif">🚀</text>
  <text x="60" y="308" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="700">Hackathon 2.0</text>
  <text x="160" y="308" font-family="'Courier New', monospace" font-size="10" fill="#6a11cb">TOP 6</text>
  <line x1="210" y1="295" x2="210" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <text x="226" y="307" font-size="14" font-family="serif">⚡</text>
  <text x="248" y="308" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="700">Vega Hackathon</text>
  <text x="356" y="308" font-family="'Courier New', monospace" font-size="10" fill="#6a11cb">TOP 10</text>

  <!-- Gov of India tag -->
  <rect x="432" y="288" width="404" height="38" rx="8" fill="#0d1117"/>
  <rect x="432" y="288" width="404" height="38" rx="8" fill="none" stroke="#00d26a" stroke-width="0.8" opacity="0.35"/>
  <text x="448" y="307" font-size="14" font-family="serif">🛰️</text>
  <text x="470" y="308" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="700">INCOIS — Govt. of India</text>
  <text x="640" y="308" font-family="'Courier New', monospace" font-size="10" fill="#00d26a">PRODUCTION SHIPPED</text>

</svg>
